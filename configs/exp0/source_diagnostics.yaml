inherit: defaults.yaml

experiment: exp0_source_diagnostics

# Datasets to diagnose (no training)
datasets:
  - name: toy_radial_angular
    dim: 2
    df: 3.0
    n_samples: 50000
  - name: student_t
    dim: 16
    df: 3.0
    n_samples: 50000
  - name: student_t
    dim: 32
    df: 3.0
    n_samples: 50000
  - name: gaussian_aniso
    dim: 16
    n_samples: 50000

# Sources to compare
sources:
  - gaussian
  - radial_oracle        # Only for synthetic datasets
  - radial_empirical_ecdf
  - radial_empirical_log  # eCDF on log-radii

# Number of samples to draw from each source for comparison
n_source_samples: 10000

# Train sizes to test for empirical source (Exp 2 preview)
n_train_sizes: [500, 1000, 5000, 20000]
